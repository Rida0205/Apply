<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آيات - إنشاء فيديو احترافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #e8f0f5 0%, #d9e2e9 100%);
            font-family: 'Noto Naskh Arabic', 'Tajawal', system-ui, sans-serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 750px;
            width: 100%;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 48px;
            padding: 40px 35px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.12);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            font-size: 2.2rem;
            color: #1a472a;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .logo p {
            color: #5a6874;
            font-size: 0.85rem;
            margin-top: 8px;
        }
        .qari-name {
            background: #eef3f7;
            display: inline-block;
            padding: 6px 24px;
            border-radius: 60px;
            color: #1a472a;
            font-size: 0.8rem;
            margin-top: 12px;
            font-weight: 500;
        }

        .selection-card {
            background: #f8fafc;
            border-radius: 32px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid #e2e8f0;
        }
        .card-title {
            color: #1a472a;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 18px;
            padding-right: 14px;
            border-right: 3px solid #2d6a4f;
        }
        .verse-range {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }
        .verse-range select {
            background: white;
            border: 1px solid #cbd5e1;
            padding: 14px 20px;
            border-radius: 60px;
            color: #1e2a3a;
            font-family: inherit;
            font-size: 0.95rem;
            cursor: pointer;
            flex: 1;
            min-width: 160px;
            text-align: center;
        }
        .arrow-icon {
            color: #2d6a4f;
            font-size: 1.3rem;
        }

        .generate-btn {
            width: 100%;
            background: #2d6a4f;
            border: none;
            padding: 18px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            margin: 15px 0 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .generate-btn:hover {
            background: #1f543d;
            transform: translateY(-2px);
        }
        .generate-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }

        .progress-area {
            background: #f8fafc;
            border-radius: 36px;
            padding: 30px 25px;
            margin-top: 20px;
            text-align: center;
            border: 1px solid #e2e8f0;
            display: none;
        }
        .progress-area.show {
            display: block;
        }
        .loading-title {
            color: #1a472a;
            font-size: 1rem;
            margin-bottom: 20px;
        }
        .progress-bar {
            background: #e2e8f0;
            border-radius: 60px;
            height: 8px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-fill {
            background: #2d6a4f;
            width: 0%;
            height: 100%;
            transition: width 0.3s;
            border-radius: 60px;
        }
        .istighfar {
            font-size: 1.2rem;
            color: #1a472a;
            font-weight: 600;
            margin: 15px 0;
            padding: 12px;
            background: white;
            border-radius: 80px;
            border: 1px solid #e2e8f0;
        }
        .wait-message {
            color: #6c7a8a;
            font-size: 0.8rem;
            margin-top: 15px;
        }
        .extra-notice {
            color: #d97706;
            font-size: 0.75rem;
            margin-top: 12px;
        }
        .status-msg {
            color: #2d6a4f;
            font-size: 0.85rem;
            margin-top: 12px;
            font-weight: 500;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            color: #8ba0ae;
            font-size: 0.7rem;
            padding-top: 20px;
            border-top: 1px solid #eef2f8;
        }
        .loading-ffmpeg {
            color: #d97706;
            font-size: 0.8rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">
        <h1>🕌 آيات 🎥</h1>
        <p>أنشئ فيديو بتلاوة القرآن بمزامنة دقيقة</p>
        <div class="qari-name">🎙️ الشيخ علي جابر - سورة الفاتحة</div>
    </div>

    <div class="selection-card">
        <div class="card-title">📖 اختيار الآيات</div>
        <div class="verse-range">
            <select id="fromVerse">
                <option value="1">من الآية ١ (البسملة)</option>
                <option value="2">من الآية ٢ (الحمد لله)</option>
                <option value="3">من الآية ٣ (الرحمن الرحيم)</option>
                <option value="4">من الآية ٤ (مالك يوم الدين)</option>
                <option value="5">من الآية ٥ (إياك نعبد)</option>
                <option value="6">من الآية ٦ (اهدنا الصراط)</option>
                <option value="7">من الآية ٧ (صراط الذين)</option>
            </select>
            <span class="arrow-icon">←</span>
            <select id="toVerse">
                <option value="1">١</option><option value="2">٢</option><option value="3">٣</option>
                <option value="4">٤</option><option value="5">٥</option><option value="6">٦</option>
                <option value="7" selected>٧</option>
            </select>
        </div>
    </div>

    <button class="generate-btn" id="generateBtn">
        🎬 إنشاء الفيديو
    </button>

    <div class="progress-area" id="progressArea">
        <div class="loading-title">⏳ جاري إنشاء الفيديو</div>
        <div class="loading-ffmpeg" id="ffmpegLoading">📦 جاري تحميل محرك الفيديو (مرة واحدة فقط)...</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="istighfar" id="istighfarText">أستغفر الله ٠</div>
        <div class="wait-message">🤲 املأ وقت الانتظار بالاستغفار والصلاة على النبي 🤲</div>
        <div class="extra-notice" id="extraNotice"></div>
        <div class="status-msg" id="statusMsg"></div>
    </div>

    <footer>
        ✅ فيديو بخلفية سوداء | خط عثماني | جودة عالية
    </footer>
</div>

<!-- تحميل مكتبة FFmpeg.wasm -->
<script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.6/dist/umd/ffmpeg.js"></script>
<script>
    // ==================== البيانات ====================
    const versesData = {
        1: { text: "بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ", start: 5.884, end: 13.407 },
        2: { text: "الْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ", start: 13.407, end: 21.520 },
        3: { text: "الرَّحْمَٰنِ الرَّحِيمِ", start: 21.520, end: 26.630 },
        4: { text: "مَالِكِ يَوْمِ الدِّينِ", start: 26.630, end: 31.353 },
        5: { text: "إِيَّاكَ نَعْبُدُ وَإِيَّاكَ نَسْتَعِينُ", start: 31.353, end: 39.195 },
        6: { text: "اهْدِنَا الصِّرَاطَ الْمُسْتَقِيمَ", start: 39.195, end: 45.519 },
        7: { text: "صِرَاطَ الَّذِينَ أَنْعَمْتَ عَلَيْهِمْ غَيْرِ الْمَغْضُوبِ عَلَيْهِمْ وَلَا الضَّالِّينَ", start: 45.519, end: 63.000 }
    };

    const audioUrl = "https://download.quranicaudio.com/quran/ali_jaber//001.mp3";

    // ==================== عناصر DOM ====================
    const fromSelect = document.getElementById('fromVerse');
    const toSelect = document.getElementById('toVerse');
    const generateBtn = document.getElementById('generateBtn');
    const progressArea = document.getElementById('progressArea');
    const progressFill = document.getElementById('progressFill');
    const istighfarText = document.getElementById('istighfarText');
    const statusMsg = document.getElementById('statusMsg');
    const extraNotice = document.getElementById('extraNotice');
    const ffmpegLoading = document.getElementById('ffmpegLoading');

    let istighfarCount = 0;
    let istighfarInterval = null;

    // ==================== دوال مساعدة ====================
    function getSelectedVerses() {
        const from = parseInt(fromSelect.value);
        const to = parseInt(toSelect.value);
        const verses = [];
        for (let i = from; i <= to; i++) {
            if (versesData[i]) verses.push({ number: i, ...versesData[i] });
        }
        return verses;
    }

    function startIstighfar() {
        istighfarCount = 0;
        if (istighfarInterval) clearInterval(istighfarInterval);
        istighfarInterval = setInterval(() => {
            istighfarCount++;
            istighfarText.textContent = `أستغفر الله ${istighfarCount}`;
        }, 800);
    }

    function stopIstighfar() {
        if (istighfarInterval) {
            clearInterval(istighfarInterval);
            istighfarInterval = null;
        }
    }

    function updateProgress(percent, message) {
        progressFill.style.width = `${Math.min(100, percent)}%`;
        if (message) statusMsg.textContent = message;
    }

    // ==================== تحميل FFmpeg ====================
    let ffmpeg = null;
    let isFFmpegLoaded = false;

    async function loadFFmpeg() {
        if (isFFmpegLoaded) return true;
        ffmpegLoading.style.display = 'block';
        try {
            ffmpeg = new FFmpeg();
            ffmpeg.on('log', ({ message }) => console.log(message));
            await ffmpeg.load();
            isFFmpegLoaded = true;
            ffmpegLoading.textContent = '✅ محرك الفيديو جاهز!';
            ffmpegLoading.style.color = '#2d6a4f';
            return true;
        } catch (err) {
            console.error(err);
            ffmpegLoading.textContent = '❌ فشل تحميل محرك الفيديو';
            ffmpegLoading.style.color = '#dc2626';
            return false;
        }
    }

    // ==================== الوظيفة الرئيسية ====================
    async function generateVideo() {
        const verses = getSelectedVerses();
        if (verses.length === 0) {
            statusMsg.textContent = "الرجاء اختيار آيات صحيحة";
            return;
        }

        if (verses.length > 20) {
            extraNotice.textContent = "📌 عدد الآيات كبير (أكثر من 20) قد يستغرق الفيديو دقيقة إضافية، نرجو الصبر";
        } else {
            extraNotice.textContent = "";
        }

        generateBtn.disabled = true;
        progressArea.classList.add('show');
        startIstighfar();
        updateProgress(5, "جاري تحميل محرك الفيديو...");

        // تحميل FFmpeg
        const loaded = await loadFFmpeg();
        if (!loaded) {
            statusMsg.textContent = "فشل تحميل محرك الفيديو، تأكد من اتصال الإنترنت";
            generateBtn.disabled = false;
            stopIstighfar();
            return;
        }

        updateProgress(10, "جاري تحميل التلاوة...");

        try {
            // === 1. تحميل الصوت ===
            const audioResponse = await fetch(audioUrl);
            if (!audioResponse.ok) throw new Error("فشل تحميل الصوت");
            const audioBuffer = await audioResponse.arrayBuffer();
            await ffmpeg.writeFile('input.mp3', new Uint8Array(audioBuffer));

            updateProgress(20, "تجهيز الآيات...");

            // === 2. إنشاء ملف SRT للتوقيتات ===
            let srtContent = "";
            let currentTime = 0;
            for (const verse of verses) {
                const start = verse.start;
                const end = verse.end;
                // تحويل إلى صيغة SRT (ساعات:دقائق:ثواني,ميلي)
                const startStr = formatTime(start);
                const endStr = formatTime(end);
                srtContent += `${verses.indexOf(verse) + 1}\n${startStr} --> ${endStr}\n${verse.text}\n\n`;
            }

            const srtBlob = new Blob([srtContent], { type: 'text/plain' });
            const srtBuffer = await srtBlob.arrayBuffer();
            await ffmpeg.writeFile('subtitles.srt', new Uint8Array(srtBuffer));

            updateProgress(30, "جاري إنشاء الفيديو...");

            // === 3. إنشاء فيديو باستخدام FFmpeg ===
            // خلفية سوداء مع النص المترجم
            const totalDuration = verses[verses.length - 1].end;
            await ffmpeg.exec([
                '-f', 'lavfi',
                '-i', `color=c=black:s=1280x720:d=${totalDuration + 1}`,
                '-i', 'input.mp3',
                '-vf', `subtitles=subtitles.srt:force_style='FontName=Noto Naskh Arabic,FontSize=36,PrimaryColour=&HFFD700&,Alignment=10,Outline=1,Shadow=1'`,
                '-c:v', 'libx264',
                '-c:a', 'aac',
                '-pix_fmt', 'yuv420p',
                '-shortest',
                'output.mp4'
            ]);

            updateProgress(80, "تجهيز الملف النهائي...");

            // === 4. قراءة الملف الناتج وتحميله ===
            const data = await ffmpeg.readFile('output.mp4');
            const blob = new Blob([data.buffer], { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);

            const a = document.createElement('a');
            a.href = url;
            a.download = `الفاتحة_${fromSelect.value}_الى_${toSelect.value}.mp4`;
            a.click();

            URL.revokeObjectURL(url);

            updateProgress(100, "تم التحميل بنجاح!");
            stopIstighfar();

            setTimeout(() => {
                progressArea.classList.remove('show');
                generateBtn.disabled = false;
                progressFill.style.width = "0%";
                istighfarText.textContent = "أستغفر الله ٠";
                statusMsg.textContent = "";
            }, 2000);

        } catch (error) {
            console.error("خطأ:", error);
            statusMsg.textContent = "حدث خطأ، حاول مرة أخرى: " + error.message;
            stopIstighfar();
            generateBtn.disabled = false;
        }
    }

    // ==================== دالة تحويل الوقت إلى صيغة SRT ====================
    function formatTime(seconds) {
        const hrs = Math.floor(seconds / 3600);
        const mins = Math.floor((seconds % 3600) / 60);
        const secs = Math.floor(seconds % 60);
        const ms = Math.floor((seconds % 1) * 1000);
        return `${String(hrs).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')},${String(ms).padStart(3, '0')}`;
    }

    // ==================== ربط الزر ====================
    generateBtn.onclick = generateVideo;
</script>
</body>
</html>
