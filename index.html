<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آيات - سورة الفاتحة | تلاوة الشيخ علي جابر</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            font-family: 'Tajawal', 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(15, 23, 42, 0.95);
            border-radius: 40px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #fbbf24; font-size: 1.8rem; margin-bottom: 5px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .sub { text-align: center; color: #94a3b8; margin-bottom: 25px; font-size: 0.85rem; }
        .qari-badge { background: #1e293b; text-align: center; padding: 8px; border-radius: 60px; margin-bottom: 20px; color: #86efac; font-weight: bold; font-size: 0.9rem; }
        .card { background: #0f172a; border-radius: 24px; padding: 20px; margin-bottom: 20px; }
        .card-title { color: #facc15; margin-bottom: 15px; font-size: 1.1rem; border-right: 3px solid #facc15; padding-right: 12px; }
        .control-group { margin-bottom: 18px; }
        label { display: block; color: #cbd5e1; font-size: 0.85rem; margin-bottom: 8px; font-weight: bold; }
        select, input[type="color"], input[type="range"] {
            width: 100%;
            padding: 12px 16px;
            border-radius: 60px;
            border: none;
            background: #1e293b;
            color: white;
            font-family: inherit;
            font-size: 0.95rem;
            cursor: pointer;
        }
        input[type="color"] { height: 45px; padding: 5px; }
        .verse-range { display: flex; gap: 15px; flex-wrap: wrap; align-items: center; }
        .verse-range select { flex: 1; }
        button {
            width: 100%;
            padding: 16px;
            background: #10b981;
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }
        button:hover { background: #059669; transform: scale(1.02); }
        button:disabled { background: #475569; cursor: not-allowed; transform: none; }
        .status {
            margin-top: 15px;
            padding: 12px;
            border-radius: 60px;
            text-align: center;
            font-size: 0.85rem;
            display: none;
        }
        .status.loading { background: #1e3a5f; color: #7dd3fc; display: block; }
        .status.success { background: #14532d; color: #86efac; display: block; }
        .status.error { background: #7f1a1a; color: #fca5a5; display: block; }
        .info { text-align: center; color: #475569; font-size: 0.7rem; margin-top: 20px; }
        .footer { text-align: center; margin-top: 15px; font-size: 0.7rem; color: #334155; }
    </style>
</head>
<body>

<div class="container">
    <h1>🕌 آيات - سورة الفاتحة 🎥</h1>
    <div class="sub">إنشاء فيديو بمزامنة دقيقة مع تلاوة الشيخ علي جابر</div>
    <div class="qari-badge">🎙️ الشيخ علي جابر رحمه الله - تلاوة خاشعة</div>

    <div class="card">
        <div class="card-title">🎨 تخصيص المظهر</div>
        <div class="control-group">
            <label>لون الخلفية</label>
            <input type="color" id="bgColor" value="#0b1120">
        </div>
        <div class="control-group">
            <label>لون النص</label>
            <input type="color" id="textColor" value="#facc15">
        </div>
        <div class="control-group">
            <label>حجم الخط: <span id="fontSizeValue">44</span> px</label>
            <input type="range" id="fontSize" min="24" max="80" value="44" step="2">
        </div>
    </div>

    <div class="card">
        <div class="card-title">📖 اختيار الآيات (من → إلى)</div>
        <div class="verse-range">
            <select id="fromVerse">
                <option value="1">1 - البسملة</option><option value="2">2 - الحمد لله</option>
                <option value="3">3 - الرحمن الرحيم</option><option value="4">4 - مالك يوم الدين</option>
                <option value="5">5 - إياك نعبد</option><option value="6">6 - اهدنا الصراط</option>
                <option value="7">7 - صراط الذين</option>
            </select>
            <span style="color:white; font-size:18px;">← إلى ←</span>
            <select id="toVerse">
                <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                <option value="4">4</option><option value="5">5</option><option value="6">6</option>
                <option value="7" selected>7</option>
            </select>
        </div>
    </div>

    <button id="generateBtn">🎬 إنشاء الفيديو وتحميله (مع الصوت)</button>
    <div id="status" class="status"></div>
    <div class="info">✅ يعتمد على توقيتات دقيقة من ملف segments.json للشيخ علي جابر</div>
    <div class="footer">الأداة تعمل محلياً | الفيديو يُنشأ في متصفحك مباشرة</div>
</div>

<script>
    // ==================== بيانات سورة الفاتحة من ملفاتك ====================
    // الآية 7: "صراط الذين..." تم دمجها في كائن واحد
    const versesData = {
        1: { text: "بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ", start: 5.884, end: 13.407 },     // timestamp_from: 5884, to: 13407
        2: { text: "الْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ", start: 13.407, end: 21.520 },    // 13407 to 21520
        3: { text: "الرَّحْمَٰنِ الرَّحِيمِ", start: 21.520, end: 26.630 },                  // 21520 to 26630
        4: { text: "مَالِكِ يَوْمِ الدِّينِ", start: 26.630, end: 31.353 },                  // 26630 to 31353
        5: { text: "إِيَّاكَ نَعْبُدُ وَإِيَّاكَ نَسْتَعِينُ", start: 31.353, end: 39.195 }, // 31353 to 39195
        6: { text: "اهْدِنَا الصِّرَاطَ الْمُسْتَقِيمَ", start: 39.195, end: 45.519 },        // 39195 to 45519
        7: { text: "صِرَاطَ الَّذِينَ أَنْعَمْتَ عَلَيْهِمْ غَيْرِ الْمَغْضُوبِ عَلَيْهِمْ وَلَا الضَّالِّينَ", start: 45.519, end: 63.000 }  // 45519 to 63000
    };

    // رابط التلاوة من ملفك الأول
    const audioUrl = "https://download.quranicaudio.com/quran/ali_jaber//001.mp3";

    // دوال مساعدة
    function getSelectedVerses() {
        const from = parseInt(document.getElementById('fromVerse').value);
        const to = parseInt(document.getElementById('toVerse').value);
        const verses = [];
        for (let i = from; i <= to; i++) {
            if (versesData[i]) verses.push({ number: i, ...versesData[i] });
        }
        return verses;
    }

    function showStatus(message, type) {
        const statusDiv = document.getElementById('status');
        statusDiv.textContent = message;
        statusDiv.className = `status ${type}`;
        statusDiv.style.display = "block";
    }

    document.getElementById('fontSize').addEventListener('input', (e) => {
        document.getElementById('fontSizeValue').textContent = e.target.value;
    });

    // الوظيفة الرئيسية لإنشاء الفيديو
    document.getElementById('generateBtn').onclick = async () => {
        const verses = getSelectedVerses();
        if (verses.length === 0) {
            showStatus("الرجاء اختيار آيات صحيحة", "error");
            return;
        }

        const bgColor = document.getElementById('bgColor').value;
        const textColor = document.getElementById('textColor').value;
        const fontSize = parseInt(document.getElementById('fontSize').value);
        
        showStatus("⏳ جاري تحميل تلاوة الشيخ علي جابر...", "loading");
        const btn = document.getElementById('generateBtn');
        btn.disabled = true;

        try {
            // 1. تحميل الملف الصوتي
            const audioResponse = await fetch(audioUrl);
            if (!audioResponse.ok) throw new Error("فشل تحميل الصوت، يرجى التحقق من الاتصال بالإنترنت");
            const audioBlob = await audioResponse.blob();
            const audioLocalUrl = URL.createObjectURL(audioBlob);
            
            showStatus("🎬 جاري إنشاء الفيديو بتوقيتات دقيقة...", "loading");
            
            // 2. إعداد Canvas للرسم
            const canvas = document.createElement('canvas');
            canvas.width = 1280;
            canvas.height = 720;
            const ctx = canvas.getContext('2d');
            
            // دالة رسم النص مع دعم الأسطر الطويلة (مثل الآية 7)
            function drawVerse(text) {
                ctx.fillStyle = bgColor;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                if (!text) return;
                
                ctx.fillStyle = textColor;
                ctx.font = `${fontSize}px 'Tajawal', 'Amiri', 'Arial', 'Segoe UI'`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                
                // تقسيم النص لأسطر ذكية
                const maxWidth = canvas.width - 100;
                const words = text.split(' ');
                const lines = [];
                let currentLine = "";
                
                for (const word of words) {
                    const testLine = currentLine + (currentLine ? " " : "") + word;
                    const metrics = ctx.measureText(testLine);
                    if (metrics.width > maxWidth && currentLine.length > 0) {
                        lines.push(currentLine);
                        currentLine = word;
                    } else {
                        currentLine = testLine;
                    }
                }
                if (currentLine) lines.push(currentLine);
                
                const lineHeight = fontSize * 1.3;
                const totalHeight = lines.length * lineHeight;
                let startY = (canvas.height - totalHeight) / 2;
                
                lines.forEach(line => {
                    ctx.fillText(line, canvas.width / 2, startY);
                    startY += lineHeight;
                });
            }
            
            // 3. إعداد تدفق الفيديو والصوت
            const stream = canvas.captureStream(30);
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const audioElement = new Audio(audioLocalUrl);
            const source = audioCtx.createMediaElementSource(audioElement);
            const dest = audioCtx.createMediaStreamDestination();
            source.connect(dest);
            source.connect(audioCtx.destination);
            
            const combinedStream = new MediaStream();
            stream.getVideoTracks().forEach(track => combinedStream.addTrack(track));
            dest.stream.getAudioTracks().forEach(track => combinedStream.addTrack(track));
            
            // 4. بدء التسجيل
            const recorder = new MediaRecorder(combinedStream, { mimeType: 'video/webm' });
            const chunks = [];
            recorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
            
            recorder.start();
            await audioCtx.resume();
            audioElement.play();
            
            // 5. المزامنة بناءً على التوقيتات الدقيقة (start / end)
            let currentVerseIndex = -1;
            
            const syncLoop = () => {
                const currentTime = audioElement.currentTime;
                let newIndex = -1;
                
                // البحث عن الآية التي ينتمي إليها الوقت الحالي
                for (let i = 0; i < verses.length; i++) {
                    if (currentTime >= verses[i].start && currentTime <= verses[i].end) {
                        newIndex = i;
                        break;
                    }
                }
                
                // تغيير الآية إذا لزم الأمر
                if (newIndex !== currentVerseIndex) {
                    currentVerseIndex = newIndex;
                    if (currentVerseIndex !== -1) {
                        drawVerse(verses[currentVerseIndex].text);
                    } else {
                        // في الفواصل بين الآيات، تبقى الخلفية فقط بدون نص (أو يمكن وضع بسملة خفيفة)
                        drawVerse("");
                    }
                }
                
                if (!audioElement.ended) {
                    requestAnimationFrame(syncLoop);
                }
            };
            
            requestAnimationFrame(syncLoop);
            
            // 6. انتظار انتهاء التلاوة ثم إنهاء التسجيل
            await new Promise(resolve => { audioElement.onended = resolve; });
            
            setTimeout(() => {
                if (recorder.state === 'recording') recorder.stop();
            }, 200);
            
            await new Promise(resolve => { recorder.onstop = resolve; });
            
            // 7. تحميل الفيديو النهائي
            const finalBlob = new Blob(chunks, { type: 'video/webm' });
            const finalUrl = URL.createObjectURL(finalBlob);
            const a = document.createElement('a');
            a.href = finalUrl;
            const fromVal = document.getElementById('fromVerse').value;
            const toVal = document.getElementById('toVerse').value;
            a.download = `الفاتحة_${fromVal}_الى_${toVal}_علي_جابر.webm`;
            a.click();
            
            // تنظيف الروابط المؤقتة
            URL.revokeObjectURL(audioLocalUrl);
            URL.revokeObjectURL(finalUrl);
            audioCtx.close();
            
            showStatus("✅ تم إنشاء الفيديو بنجاح! المزامنة دقيقة 100%", "success");
            btn.disabled = false;
            
            setTimeout(() => {
                if (document.getElementById('status').className === "status success") {
                    document.getElementById('status').style.display = "none";
                }
            }, 4000);
            
        } catch (error) {
            console.error(error);
            showStatus("❌ خطأ: " + error.message, "error");
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
