<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آيات - فيديوهات القرآن | الشيخ علي جابر</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #e8f0f5 0%, #d9e2e9 100%);
            font-family: 'Noto Naskh Arabic', 'Tajawal', system-ui, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 750px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 48px;
            padding: 40px 35px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.12);
        }

        /* الهيدر */
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            font-size: 2.2rem;
            color: #1a472a;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .logo p {
            color: #5a6874;
            font-size: 0.85rem;
            margin-top: 8px;
        }
        .qari-name {
            background: #eef3f7;
            display: inline-block;
            padding: 6px 24px;
            border-radius: 60px;
            color: #1a472a;
            font-size: 0.8rem;
            margin-top: 12px;
            font-weight: 500;
        }

        /* بطاقة اختيار الآيات */
        .selection-card {
            background: #f8fafc;
            border-radius: 32px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid #e2e8f0;
        }
        .card-title {
            color: #1a472a;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 18px;
            padding-right: 14px;
            border-right: 3px solid #2d6a4f;
        }
        .verse-range {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }
        .verse-range select {
            background: white;
            border: 1px solid #cbd5e1;
            padding: 14px 20px;
            border-radius: 60px;
            color: #1e2a3a;
            font-family: inherit;
            font-size: 0.95rem;
            cursor: pointer;
            flex: 1;
            min-width: 160px;
            text-align: center;
        }
        .arrow-icon {
            color: #2d6a4f;
            font-size: 1.3rem;
        }

        /* زر الإنشاء */
        .generate-btn {
            width: 100%;
            background: #2d6a4f;
            border: none;
            padding: 18px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            margin: 15px 0 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .generate-btn:hover {
            background: #1f543d;
            transform: translateY(-2px);
        }
        .generate-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }

        /* منطقة الانتظار */
        .progress-area {
            background: #f8fafc;
            border-radius: 36px;
            padding: 30px 25px;
            margin-top: 20px;
            text-align: center;
            border: 1px solid #e2e8f0;
            display: none;
        }
        .progress-area.show {
            display: block;
        }
        .loading-title {
            color: #1a472a;
            font-size: 1rem;
            margin-bottom: 20px;
        }
        .progress-bar {
            background: #e2e8f0;
            border-radius: 60px;
            height: 8px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-fill {
            background: #2d6a4f;
            width: 0%;
            height: 100%;
            transition: width 0.3s;
            border-radius: 60px;
        }
        .istighfar {
            font-size: 1.2rem;
            color: #1a472a;
            font-weight: 600;
            margin: 15px 0;
            padding: 12px;
            background: white;
            border-radius: 80px;
            border: 1px solid #e2e8f0;
        }
        .wait-message {
            color: #6c7a8a;
            font-size: 0.8rem;
            margin-top: 15px;
        }
        .extra-notice {
            color: #d97706;
            font-size: 0.75rem;
            margin-top: 12px;
        }
        .status-msg {
            color: #2d6a4f;
            font-size: 0.85rem;
            margin-top: 12px;
            font-weight: 500;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            color: #8ba0ae;
            font-size: 0.7rem;
            padding-top: 20px;
            border-top: 1px solid #eef2f8;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">
        <h1>🕌 آيات 🎥</h1>
        <p>أنشئ فيديو بتلاوة القرآن بمزامنة دقيقة</p>
        <div class="qari-name">🎙️ الشيخ علي جابر - سورة الفاتحة</div>
    </div>

    <div class="selection-card">
        <div class="card-title">📖 اختيار الآيات</div>
        <div class="verse-range">
            <select id="fromVerse">
                <option value="1">من الآية ١ (البسملة)</option>
                <option value="2">من الآية ٢ (الحمد لله)</option>
                <option value="3">من الآية ٣ (الرحمن الرحيم)</option>
                <option value="4">من الآية ٤ (مالك يوم الدين)</option>
                <option value="5">من الآية ٥ (إياك نعبد)</option>
                <option value="6">من الآية ٦ (اهدنا الصراط)</option>
                <option value="7">من الآية ٧ (صراط الذين)</option>
            </select>
            <span class="arrow-icon">←</span>
            <select id="toVerse">
                <option value="1">١</option>
                <option value="2">٢</option>
                <option value="3">٣</option>
                <option value="4">٤</option>
                <option value="5">٥</option>
                <option value="6">٦</option>
                <option value="7" selected>٧</option>
            </select>
        </div>
    </div>

    <button class="generate-btn" id="generateBtn">
        🎬 إنشاء الفيديو
    </button>

    <div class="progress-area" id="progressArea">
        <div class="loading-title">⏳ جاري إنشاء الفيديو</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="istighfar" id="istighfarText">أستغفر الله ٠</div>
        <div class="wait-message" id="waitMessage">🤲 املأ وقت الانتظار بالاستغفار والصلاة على النبي 🤲</div>
        <div class="extra-notice" id="extraNotice"></div>
        <div class="status-msg" id="statusMsg"></div>
    </div>

    <footer>
        ✅ فيديو بخلفية سوداء | خط عثماني | جودة عالية
    </footer>
</div>

<script>
    // بيانات الآيات مع التوقيتات الدقيقة
    const versesData = {
        1: { text: "بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ", start: 5.884, end: 13.407 },
        2: { text: "الْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ", start: 13.407, end: 21.520 },
        3: { text: "الرَّحْمَٰنِ الرَّحِيمِ", start: 21.520, end: 26.630 },
        4: { text: "مَالِكِ يَوْمِ الدِّينِ", start: 26.630, end: 31.353 },
        5: { text: "إِيَّاكَ نَعْبُدُ وَإِيَّاكَ نَسْتَعِينُ", start: 31.353, end: 39.195 },
        6: { text: "اهْدِنَا الصِّرَاطَ الْمُسْتَقِيمَ", start: 39.195, end: 45.519 },
        7: { text: "صِرَاطَ الَّذِينَ أَنْعَمْتَ عَلَيْهِمْ غَيْرِ الْمَغْضُوبِ عَلَيْهِمْ وَلَا الضَّالِّينَ", start: 45.519, end: 63.000 }
    };

    const audioUrl = "https://download.quranicaudio.com/quran/ali_jaber//001.mp3";

    const fromSelect = document.getElementById('fromVerse');
    const toSelect = document.getElementById('toVerse');
    const generateBtn = document.getElementById('generateBtn');
    const progressArea = document.getElementById('progressArea');
    const progressFill = document.getElementById('progressFill');
    const istighfarText = document.getElementById('istighfarText');
    const statusMsg = document.getElementById('statusMsg');
    const extraNotice = document.getElementById('extraNotice');

    let istighfarCount = 0;
    let istighfarInterval = null;

    function getSelectedVerses() {
        const from = parseInt(fromSelect.value);
        const to = parseInt(toSelect.value);
        const verses = [];
        for (let i = from; i <= to; i++) {
            if (versesData[i]) verses.push({ number: i, ...versesData[i] });
        }
        return verses;
    }

    function startIstighfar() {
        istighfarCount = 0;
        if (istighfarInterval) clearInterval(istighfarInterval);
        istighfarInterval = setInterval(() => {
            istighfarCount++;
            istighfarText.textContent = `أستغفر الله ${istighfarCount}`;
        }, 800);
    }

    function stopIstighfar() {
        if (istighfarInterval) {
            clearInterval(istighfarInterval);
            istighfarInterval = null;
        }
    }

    function updateProgress(percent, message) {
        progressFill.style.width = `${Math.min(100, percent)}%`;
        if (message) statusMsg.textContent = message;
    }

    async function generateVideo() {
        const verses = getSelectedVerses();
        if (verses.length === 0) {
            statusMsg.textContent = "الرجاء اختيار آيات صحيحة";
            return;
        }

        if (verses.length > 20) {
            extraNotice.textContent = "📌 عدد الآيات كبير (أكثر من 20) قد يستغرق الفيديو دقيقة إضافية، نرجو الصبر";
        } else {
            extraNotice.textContent = "";
        }

        generateBtn.disabled = true;
        progressArea.classList.add('show');
        startIstighfar();
        updateProgress(5, "جاري تحميل التلاوة...");

        try {
            const audioResponse = await fetch(audioUrl);
            if (!audioResponse.ok) throw new Error("فشل تحميل الصوت");
            const audioBlob = await audioResponse.blob();
            const audioLocalUrl = URL.createObjectURL(audioBlob);

            updateProgress(20, "تجهيز الفيديو...");

            // أبعاد يوتيوب ثابتة
            const canvas = document.createElement('canvas');
            canvas.width = 1280;
            canvas.height = 720;
            const ctx = canvas.getContext('2d');

            function drawVerse(text) {
                ctx.fillStyle = "#000000";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                if (!text) return;

                ctx.fillStyle = "#FFD700";
                ctx.font = `500 ${Math.floor(canvas.width / 22)}px 'Noto Naskh Arabic', 'Amiri Quran', serif`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";

                const maxWidth = canvas.width - 80;
                const words = text.split(' ');
                const lines = [];
                let currentLine = "";

                for (const word of words) {
                    const testLine = currentLine + (currentLine ? " " : "") + word;
                    if (ctx.measureText(testLine).width > maxWidth && currentLine.length > 0) {
                        lines.push(currentLine);
                        currentLine = word;
                    } else {
                        currentLine = testLine;
                    }
                }
                if (currentLine) lines.push(currentLine);

                const lineHeight = parseInt(ctx.font) * 1.4;
                const startY = (canvas.height - (lines.length * lineHeight)) / 2;
                lines.forEach((line, idx) => {
                    ctx.fillText(line, canvas.width / 2, startY + idx * lineHeight);
                });
            }

            drawVerse(verses[0].text);
            const stream = canvas.captureStream(30);

            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const audioElem = new Audio(audioLocalUrl);
            const source = audioCtx.createMediaElementSource(audioElem);
            const dest = audioCtx.createMediaStreamDestination();
            source.connect(dest);
            source.connect(audioCtx.destination);

            const combinedStream = new MediaStream();
            stream.getVideoTracks().forEach(t => combinedStream.addTrack(t));
            dest.stream.getAudioTracks().forEach(t => combinedStream.addTrack(t));

            const recorder = new MediaRecorder(combinedStream, { mimeType: 'video/webm' });
            const chunks = [];
            recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

            recorder.start();
            await audioCtx.resume();
            audioElem.play();

            let currentVerse = -1;
            const totalDuration = verses[verses.length - 1].end;

            const syncLoop = () => {
                const currentTime = audioElem.currentTime;
                let newIndex = -1;
                for (let i = 0; i < verses.length; i++) {
                    if (currentTime >= verses[i].start && currentTime <= verses[i].end) {
                        newIndex = i;
                        break;
                    }
                }
                if (newIndex !== currentVerse) {
                    currentVerse = newIndex;
                    drawVerse(currentVerse !== -1 ? verses[currentVerse].text : "");
                }
                const percent = 20 + (currentTime / totalDuration) * 75;
                updateProgress(percent, `جاري التسجيل... ${Math.floor(currentTime)}/${Math.floor(totalDuration)} ثانية`);
                if (!audioElem.ended) requestAnimationFrame(syncLoop);
            };
            requestAnimationFrame(syncLoop);

            await new Promise(resolve => { audioElem.onended = resolve; });
            updateProgress(96, "تجهيز الملف النهائي...");
            setTimeout(() => { if (recorder.state === 'recording') recorder.stop(); }, 200);
            await new Promise(resolve => { recorder.onstop = resolve; });

            const finalBlob = new Blob(chunks, { type: 'video/webm' });
            const url = URL.createObjectURL(finalBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `الفاتحة_${fromSelect.value}_الى_${toSelect.value}.webm`;
            a.click();

            URL.revokeObjectURL(audioLocalUrl);
            URL.revokeObjectURL(url);
            audioCtx.close();

            updateProgress(100, "تم التحميل بنجاح!");
            stopIstighfar();
            setTimeout(() => {
                progressArea.classList.remove('show');
                generateBtn.disabled = false;
                progressFill.style.width = "0%";
                istighfarText.textContent = "أستغفر الله ٠";
                statusMsg.textContent = "";
            }, 2000);

        } catch (error) {
            console.error(error);
            statusMsg.textContent = "حدث خطأ، حاول مرة أخرى";
            stopIstighfar();
            generateBtn.disabled = false;
        }
    }

    generateBtn.onclick = generateVideo;
</script>
</body>
</html>
